# =================================================================
# General configuration
# =================================================================

# Mosquitto 2.0 이상 버전부터는 기본적으로 외부 접속(localhost 외)이 차단됩니다.
# 외부 장치나 다른 컨테이너에서 접근할 수 있도록 익명 접속을 허용합니다.
# (실제 운영 환경에서는 false로 설정하고 사용자 계정/비밀번호 설정을 권장합니다)
allow_anonymous true

# =================================================================
# Listeners (포트 및 프로토콜 설정)
# =================================================================

# MQTT 기본 통신 리스너 (1883 포트, 모든 IP 허용)
listener 1883 0.0.0.0

# WebSockets 통신 리스너 (9001 포트, 모든 IP 허용)
# 웹 브라우저나 웹 앱에서 MQTT 브로커와 통신할 때 사용됩니다.
listener 9001 0.0.0.0
protocol websockets

# =================================================================
# Persistence (지속성 설정)
# =================================================================

# 브로커가 재시작되어도 메시지와 세션 상태를 저장하도록 설정합니다.
persistence true
persistence_location /mosquitto/data/

# =================================================================
# Logging (로그 설정)
# =================================================================

# 로그를 표준 출력(컨테이너 콘솔)과 파일 모두에 남기도록 설정합니다.
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log

# 기록할 로그 레벨 지정
log_type error
log_type warning
log_type notice
log_type information

# 클라이언트의 연결 및 해제 상태를 로그로 상세히 기록
connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S
