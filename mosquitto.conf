# =================================================================
# General & Security Configuration (일반 및 보안 설정)
# =================================================================

# Mosquitto 2.0 이상부터는 외부 접속(localhost 외)이 기본 차단됩니다.
# 개발 및 테스트 환경용으로 익명 접속을 허용합니다.
# (⚠️ 실제 운영(Production) 환경에서는 false로 변경하고 아래 password_file 설정을 활성화해야 합니다)
allow_anonymous true

# [운영 환경 설정 예시]
# allow_anonymous false
# password_file /mosquitto/config/password.txt

# =================================================================
# Listeners (포트 및 프로토콜 설정)
# =================================================================

# MQTT 기본 통신 리스너 (기본 포트 1883, 외부 모든 IP 허용)
# 주소를 생략하면 모든 네트워크 인터페이스(0.0.0.0)에 자동으로 바인딩됩니다.
listener 1883

# WebSockets 통신 리스너 (웹 앱 및 브라우저 통신용 포트 9001)
listener 9001
protocol websockets

# =================================================================
# Persistence (지속성 설정)
# =================================================================

# 브로커가 재시작되어도 메시지와 세션 상태를 디스크에 저장합니다.
# ⚠️ 주의: 컨테이너 휘발성 방지를 위해 Docker 구동 시 `/mosquitto/data/` 경로를 
# 반드시 외부 호스트 볼륨으로 마운트해 주세요. (예: -v /host/data:/mosquitto/data)
persistence true
persistence_location /mosquitto/data/

# =================================================================
# Logging (로그 설정)
# =================================================================

# 도커 모범 사례(Best Practice)에 따라 로그를 콘솔 표준 출력(stdout)으로 전송합니다.
# 'docker logs' 명령어로 편리하게 실시간 모니터링이 가능하며 디스크 부족 문제를 방지합니다.
log_dest stdout

# 기록할 로그 레벨 지정
log_type error
log_type warning
log_type notice
log_type information

# 클라이언트의 연결 및 해제 상태를 상세히 기록
connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S
